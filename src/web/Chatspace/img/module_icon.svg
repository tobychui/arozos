    <line x1="56" y1="44" x2="50" y2="78"/>
    <line x1="76" y1="44" x2="70" y2="78"/>
    <line x1="45" y1="53" x2="83" y2="53"/>
    <line x1="42" y1="69" x2="80" y2="69"/>
