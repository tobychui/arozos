  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#csbg)"/>
  <!-- speech bubble -->
  <path d="M64 26c-22.6 0-41 15.2-41 34 0 10.6 5.9 20 15.1 26.2-.6 4.6-2.5 10.2-6.9 14.4-.9.9-.3 2.5 1 2.5 8.6-.2 15.8-3.6 20.7-7.2 3.5.8 7.3 1.2 11.1 1.2 22.6 0 41-15.2 41-34s-18.4-37.1-41-37.1z"
        fill="#ffffff" opacity="0.96"/>
