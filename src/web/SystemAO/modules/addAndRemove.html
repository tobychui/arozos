<style>
/* ══ WebApp Manager ══════════════════════════════════════════════ */
#webapp-root {
    --wa-bg:      #ffffff;
    --wa-card:    #f5f5f7;
    --wa-border:  #e0e0e0;
    --wa-text:    #1d1d1f;
    --wa-dim:     #6e6e73;
    --wa-muted:   #98989d;
    --wa-soft:    #f0f0f2;
    --wa-accent:  #0071e3;
    --wa-danger:  #ff3b30;
    --wa-success: #34c759;
    --wa-shadow:  0 2px 14px rgba(0,0,0,0.08);

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    color: var(--wa-text);
    padding: 20px;
}

#webapp-root.dark {
    --wa-bg:      #1c1c1e;
    --wa-card:    #2c2c2e;
    --wa-border:  #3a3a3c;
    --wa-text:    #ececec;
    --wa-dim:     #aeaeb2;
    --wa-muted:   #636366;
    --wa-soft:    #343436;
    --wa-accent:  #2997ff;
    --wa-danger:  #ff453a;
    --wa-success: #30d158;
    --wa-shadow:  0 2px 16px rgba(0,0,0,0.35);
}

/* ── Status banners ─────────────────────────────────────────── */
.wa-banner {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
}
.wa-banner.ok  { background: rgba(52,199,89,0.12);  border: 1px solid rgba(52,199,89,0.28);  color: #1a6e30; }
.wa-banner.err { background: rgba(255,59,48,0.10);  border: 1px solid rgba(255,59,48,0.25);  color: #b02020; }
#webapp-root.dark .wa-banner.ok  { color: #30d158; }
#webapp-root.dark .wa-banner.err { color: #ff453a; }

/* ── Install card ───────────────────────────────────────────── */
#wa-install-card {
    background: var(--wa-card);
    border: 1px solid var(--wa-border);
    border-radius: 13px;
    overflow: hidden;
    margin-bottom: 22px;
}

#wa-install-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
}
#wa-install-header:hover { background: var(--wa-border); }

#wa-install-plus {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--wa-accent);
    color: #fff;
    font-size: 22px;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
}

#wa-install-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--wa-text);
}

#wa-install-chevron {
    width: 16px;
    height: 16px;
    color: var(--wa-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
}
#wa-install-chevron.open { transform: rotate(180deg); }

#wa-install-body {
    padding: 4px;
    padding-bottom: 5px !important;
    border-top: 1px solid var(--wa-border);
    display: none;
}

.wa-slabel {
    font-size: 11px;
    font-weight: 500;
    color: var(--wa-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 14px 0 8px;
}

.wa-row { display: flex; gap: 8px; align-items: center; }

.wa-input {
    flex: 1;
    height: 34px;
    padding: 0 10px;
    border: 1px solid var(--wa-border);
    border-radius: 8px;
    background: var(--wa-bg);
    color: var(--wa-text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    min-width: 0;
    transition: border-color 0.15s;
}
.wa-input:focus { border-color: var(--wa-accent); }
.wa-input.err   { border-color: var(--wa-danger); }

.wa-btn {
    height: 34px;
    padding: 0 14px;
    border: 1px solid var(--wa-border);
    border-radius: 8px;
    background: var(--wa-bg);
    color: var(--wa-text);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.1s, border-color 0.1s, opacity 0.1s;
}
.wa-btn:hover            { background: var(--wa-soft); }
.wa-btn.primary          { background: var(--wa-accent); border-color: var(--wa-accent); color: #fff; }
.wa-btn.primary:hover    { opacity: 0.85; }
.wa-btn.danger           { background: var(--wa-danger); border-color: var(--wa-danger); color: #fff; }
.wa-btn.danger:hover     { opacity: 0.85; }
.wa-btn:disabled         { opacity: 0.45; cursor: not-allowed; }

/* Drop zone */
#wa-drop-zone {
    margin-top: 6px;
    border: 2px dashed var(--wa-border);
    border-radius: 11px;
    padding: 22px 16px 18px;
    text-align: center;
    cursor: pointer;
    background: var(--wa-bg);
    transition: border-color 0.15s, background 0.15s;
}
#wa-drop-zone:hover,
#wa-drop-zone.over { border-color: var(--wa-accent); background: rgba(0,113,227,0.04); }

#wa-drop-icon { color: var(--wa-muted); display: block; margin: 0 auto 8px; }

#wa-drop-text {
    font-size: 12px;
    color: var(--wa-dim);
    line-height: 1.5;
}
#wa-drop-text u { color: var(--wa-accent); text-decoration: underline; cursor: pointer; }

#wa-upload-status {
    display: none;
    margin-top: 10px;
    font-size: 12px;
    color: var(--wa-accent);
    text-align: center;
}

#wa-file-input { display: none; }

/* ── Grid section header ────────────────────────────────────── */
#wa-grid-header {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-bottom: 12px;
}
#wa-grid-title  { font-size: 13px; font-weight: 600; color: var(--wa-text); }
#wa-grid-count  { font-size: 12px; color: var(--wa-muted); }

/* Loading / empty states */
#wa-loading { font-size: 13px; color: var(--wa-muted); padding: 20px 0; text-align: center; }
#wa-empty   { font-size: 13px; color: var(--wa-muted); padding: 24px 0; text-align: center; display: none; }

/* ── Launchpad grid ─────────────────────────────────────────── */
#wa-grid,
#wa-sys-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
    gap: 4px 6px;
}

.wa-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px 8px;
    border-radius: 11px;
    cursor: pointer;
    position: relative;
    user-select: none;
    transition: background 0.12s;
}
.wa-cell:hover    { background: var(--wa-soft); }
.wa-cell.selected { background: rgba(0,113,227,0.10); }

.wa-cell-img-wrap {
    position: relative;
    width: 54px;
    height: 54px;
    margin-bottom: 6px;
}

.wa-cell-img {
    width: 54px;
    height: 54px;
    object-fit: contain;
    border-radius: 13px;
    display: block;
}

/* Floating × delete badge */
.wa-del-dot {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 19px;
    height: 19px;
    border-radius: 50%;
    background: var(--wa-danger);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.15s, transform 0.15s;
    z-index: 2;
}
.wa-cell:hover .wa-del-dot { opacity: 1; transform: scale(1); }
.wa-del-dot.hidden          { display: none; }
@media (hover: none) { .wa-del-dot { opacity: 1; transform: scale(1); } }

.wa-cell-name {
    font-size: 11px;
    color: var(--wa-text);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    line-height: 1.3;
}

/* ── System Apps section header ─────────────────────────────── */
#wa-sys-header {
    display: none;
    align-items: baseline;
    gap: 7px;
    margin: 22px 0 12px;
}

/* ── Detail panel (inline in grid) ─────────────────────────── */
.wa-inline-detail {
    grid-column: 1 / -1;
    margin: 4px 0 8px;
    background: var(--wa-bg);
    border: 1px solid var(--wa-border);
    border-radius: 13px;
    padding: 18px 20px;
    box-shadow: var(--wa-shadow);
}

#wa-detail-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
}

#wa-detail-icon {
    width: 56px;
    height: 56px;
    object-fit: contain;
    border-radius: 13px;
    flex-shrink: 0;
}

#wa-detail-names { flex: 1; min-width: 0; }
#wa-detail-name  { font-size: 17px; font-weight: 600; color: var(--wa-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#wa-detail-sub   { font-size: 12px; color: var(--wa-muted); margin-top: 3px; }

#wa-detail-desc {
    font-size: 13px;
    color: var(--wa-dim);
    line-height: 1.55;
    margin-bottom: 14px;
}

#wa-detail-divider { height: 1px; background: var(--wa-border); margin: 12px 0; }

.wa-info-grid {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 7px 12px;
    font-size: 12px;
    margin-bottom: 18px;
}
.wa-info-key { color: var(--wa-muted); font-weight: 500; }
.wa-info-val { color: var(--wa-dim); font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 11.5px; word-break: break-all; }

#wa-detail-footer { display: flex; justify-content: flex-end; gap: 8px; }

@media (max-width: 480px) {
    #wa-grid, #wa-sys-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
    .wa-info-grid { grid-template-columns: 1fr; }
    .wa-info-key { margin-bottom: -4px; }
}

@keyframes wa-spin { to { transform: rotate(360deg); } }
.wa-spinning {
    animation: wa-spin 0.75s linear infinite;
    transform-origin: center;
    display: inline-block;
    vertical-align: -2px;
    margin-right: 5px;
}
</style>

<div id="webapp-root">

    <!-- Status banners -->
    <div class="wa-banner ok"  id="wa-ok"></div>
    <div class="wa-banner err" id="wa-err"></div>

    <!-- ── Install card ── -->
    <div id="wa-install-card">
        <div id="wa-install-header" onclick="waToggleInstall()">
            <div id="wa-install-plus" style="padding-bottom: 5px;">+</div>
            <div id="wa-install-title" locale="addAndRemove/installTitle">Install New WebApp</div>
            <svg id="wa-install-chevron" viewBox="0 0 16 16" fill="none">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <div id="wa-install-body">
            <!-- Install from virtual file system -->
            <div class="wa-slabel" locale="addAndRemove/installFromFS">Install from File System</div>
            <div class="wa-row">
                <input type="text" id="wa-zip-path" class="wa-input"
                       placeholder="addAndRemove/zipPlaceholder" readonly>
                <button class="wa-btn" onclick="waSelectFile()" locale="addAndRemove/browse">Browse</button>
                <button class="wa-btn primary" id="wa-zip-btn" onclick="waInstallFromPath()" locale="addAndRemove/install">Install</button>
            </div>

            <!-- Drag-and-drop / direct upload -->
            <div class="wa-slabel" locale="addAndRemove/uploadAndInstall">Upload &amp; Install</div>
            <div id="wa-drop-zone">
                <svg id="wa-drop-icon" width="34" height="34" viewBox="0 0 24 24" fill="none">
                    <path d="M12 15V5m0 0L8.5 8.5M12 5l3.5 3.5" stroke="currentColor"
                          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"
                          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <div id="wa-drop-text">
                    <span locale="addAndRemove/dropPre">Drop a <b>.zip</b> file here to install, or </span><u locale="addAndRemove/dropClickBrowse" onclick="event.stopPropagation();document.getElementById('wa-file-input').click()">click to browse</u>
                </div>
            </div>
            <div id="wa-upload-status">
                <svg class="wa-spinning" width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5" opacity=".25"/>
                    <path d="M12 3a9 9 0 019 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <span locale="addAndRemove/uploading">Uploading and installing…</span>
            </div>
            <input type="file" id="wa-file-input" accept=".zip" onchange="waUploadFile(this)">
        </div>
    </div>

    <!-- ── Installed WebApps grid ── -->
    <div id="wa-grid-header">
        <span id="wa-grid-title" locale="addAndRemove/installedWebApps">Installed WebApps</span>
        <span id="wa-grid-count"></span>
    </div>
    <div id="wa-loading" locale="addAndRemove/loading">Loading…</div>
    <div id="wa-empty" locale="addAndRemove/noWebApps">No WebApps installed.</div>
    <div id="wa-grid"></div>

    <!-- ── System Apps grid ── -->
    <div id="wa-sys-header">
        <span style="font-size:13px;font-weight:600;color:var(--wa-text)" locale="addAndRemove/systemApps">System Apps</span>
        <span id="wa-sys-count" style="font-size:12px;color:var(--wa-muted)"></span>
    </div>
    <div id="wa-sys-grid"></div>

</div>

<script>
(function () {
    /* ── State ─────────────────────────────────────────────── */
    var waMods    = [];
    var waSelCell = null;
    var waLocale  = { getString: function(k, o) { return o; } };

    /* ── Theme ─────────────────────────────────────────────── */
    function waTheme() {
        var root = document.getElementById('webapp-root');
        if (!root) return;
        try {
            if (typeof preferredTheme !== 'undefined') {
                root.classList.toggle('dark', preferredTheme === 'dark' || preferredTheme === 'darkTheme');
            } else {
                ao_module_getSystemThemeColor(function (c) {
                    root.classList.toggle('dark', c !== 'whiteTheme');
                });
            }
        } catch (e) {}
    }

    /* ── Helpers ────────────────────────────────────────────── */
    function waEsc(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function waBytes(b) {
        if (!b || b === 0) return '0 B';
        var u = ['B', 'KB', 'MB', 'GB', 'TB'];
        var i = Math.floor(Math.log(b) / Math.log(1024));
        return (b / Math.pow(1024, i)).toFixed(1).replace(/\.0$/, '') + '\u202f' + u[i];
    }

    function waMsg(type, text) {
        var el = document.getElementById('wa-' + type);
        if (!el) return;
        el.textContent = text;
        el.style.display = 'block';
        clearTimeout(el._t);
        el._t = setTimeout(function () { el.style.display = 'none'; }, 5000);
    }

    function waNotifyDesktop() {
        try { if (parent && parent.initModuleList) parent.initModuleList(); } catch (e) {}
    }

    /* ── Install card toggle ────────────────────────────────── */
    window.waToggleInstall = function () {
        var body    = document.getElementById('wa-install-body');
        var chevron = document.getElementById('wa-install-chevron');
        var isOpen  = body.style.display === 'block';
        body.style.display = isOpen ? 'none' : 'block';
        chevron.classList.toggle('open', !isOpen);
    };

    /* ── Install from virtual FS ────────────────────────────── */
    window.waSelectFile = function () {
        ao_module_openFileSelector(function (files) {
            if (files && files.length > 0) {
                document.getElementById('wa-zip-path').value = files[0].filepath;
                document.getElementById('wa-zip-path').classList.remove('err');
            }
        }, 'user:/Desktop', 'file', true, { filter: ['zip'] });
    };

    window.waInstallFromPath = function () {
        var inp  = document.getElementById('wa-zip-path');
        var path = inp.value.trim();
        if (!path) { inp.classList.add('err'); return; }
        inp.classList.remove('err');

        var btn = document.getElementById('wa-zip-btn');
        btn.disabled = true;
        btn.textContent = waLocale.getString('addAndRemove/installing', 'Installing…');

        $.ajax({
            url:    '../../system/modules/installViaZip',
            method: 'POST',
            data:   { path: path },
            success: function (data) {
                btn.disabled = false;
                btn.textContent = waLocale.getString('addAndRemove/install', 'Install');
                if (data && data.error) {
                    waMsg('err', data.error);
                } else {
                    inp.value = '';
                    waMsg('ok', waLocale.getString('addAndRemove/installOk', 'WebApp installed successfully.'));
                    waLoadGrid();
                    waNotifyDesktop();
                }
            },
            error: function () {
                btn.disabled = false;
                btn.textContent = waLocale.getString('addAndRemove/install', 'Install');
                waMsg('err', waLocale.getString('addAndRemove/installFail', 'Installation failed. Check server logs.'));
            }
        });
    };

    /* ── Drag-and-drop upload ───────────────────────────────── */
    function waInitDrop() {
        var zone = document.getElementById('wa-drop-zone');
        if (!zone) return;
        zone.addEventListener('dragover', function (e) {
            e.preventDefault();
            zone.classList.add('over');
        });
        zone.addEventListener('dragleave', function (e) {
            e.preventDefault();
            zone.classList.remove('over');
        });
        zone.addEventListener('drop', function (e) {
            e.preventDefault();
            zone.classList.remove('over');
            var f = e.dataTransfer.files;
            if (f && f.length > 0) waUploadZip(f[0]);
        });
        zone.addEventListener('click', function () {
            document.getElementById('wa-file-input').click();
        });
    }

    window.waUploadFile = function (inp) {
        if (inp.files && inp.files.length > 0) {
            waUploadZip(inp.files[0]);
            inp.value = '';
        }
    };

    function waUploadZip(file) {
        if (!file.name.toLowerCase().endsWith('.zip')) {
            waMsg('err', waLocale.getString('addAndRemove/zipOnly', 'Only .zip files are supported.'));
            return;
        }
        var status = document.getElementById('wa-upload-status');
        status.style.display = 'block';

        var fd = new FormData();
        fd.append('zipfile', file);

        $.ajax({
            url:         '../../system/modules/uploadAndInstall',
            method:      'POST',
            data:        fd,
            processData: false,
            contentType: false,
            success: function (data) {
                status.style.display = 'none';
                if (data && data.error) {
                    waMsg('err', data.error);
                } else {
                    waMsg('ok', waLocale.getString('addAndRemove/installOk', 'WebApp installed successfully.'));
                    waLoadGrid();
                    waNotifyDesktop();
                }
            },
            error: function () {
                status.style.display = 'none';
                waMsg('err', waLocale.getString('addAndRemove/uploadFail', 'Upload failed.'));
            }
        });
    }

    /* ── Grid ───────────────────────────────────────────────── */
    function renderCells(gridEl, mods) {
        mods.forEach(function (mod) {
            var idx  = waMods.indexOf(mod);
            var cell = document.createElement('div');
            cell.className = 'wa-cell';
            cell.setAttribute('data-idx', idx);

            var delClass = mod.Uninstallable ? 'wa-del-dot' : 'wa-del-dot hidden';
            cell.innerHTML =
                '<div class="wa-cell-img-wrap">' +
                    '<img class="wa-cell-img" src="../../' + waEsc(mod.IconPath) + '" ' +
                        'onerror="this.src=\'../../SystemAO/system_setting/img/small_icon.png\'" alt="">' +
                    '<button class="' + delClass + '" ' +
                        'onclick="waDeleteByIdx(event,' + idx + ')" ' +
                        'title="Remove">&times;</button>' +
                '</div>' +
                '<div class="wa-cell-name">' + waEsc(mod.Name) + '</div>';

            cell.addEventListener('click', (function (i, c) {
                return function () { waSelectCell(i, c); };
            })(idx, cell));

            gridEl.appendChild(cell);
        });
    }

    function waLoadGrid() {
        document.getElementById('wa-loading').style.display = 'block';
        document.getElementById('wa-grid').innerHTML = '';
        document.getElementById('wa-sys-grid').innerHTML = '';
        document.getElementById('wa-empty').style.display = 'none';
        document.getElementById('wa-sys-header').style.display = 'none';
        waCloseDetail();

        $.get('../../system/module/install', function (data) {
            document.getElementById('wa-loading').style.display = 'none';
            waMods = data || [];

            var installed = waMods.filter(function (m) { return m.Uninstallable; });
            var system    = waMods.filter(function (m) { return !m.Uninstallable; });

            document.getElementById('wa-grid-count').textContent = '(' + installed.length + ')';

            if (installed.length === 0) {
                document.getElementById('wa-empty').style.display = 'block';
            } else {
                renderCells(document.getElementById('wa-grid'), installed);
            }

            if (system.length > 0) {
                document.getElementById('wa-sys-header').style.display = 'flex';
                document.getElementById('wa-sys-count').textContent = '(' + system.length + ')';
                renderCells(document.getElementById('wa-sys-grid'), system);
            }
        });
    }

    /* ── Inline detail ──────────────────────────────────────── */
    function waFindLastInRow(cell) {
        var cells = cell.parentElement.querySelectorAll('.wa-cell');
        var top   = cell.getBoundingClientRect().top;
        var last  = cell;
        cells.forEach(function (c) {
            if (Math.abs(c.getBoundingClientRect().top - top) < 5 &&
                c.getBoundingClientRect().right > last.getBoundingClientRect().right) {
                last = c;
            }
        });
        return last;
    }

    function waSelectCell(idx, cell) {
        if (waSelCell === cell) { waCloseDetail(); return; }
        if (waSelCell) waSelCell.classList.remove('selected');
        waSelCell = cell;
        cell.classList.add('selected');

        var old = document.querySelector('.wa-inline-detail');
        if (old) old.remove();

        var detail = waBuildDetailEl(waMods[idx]);
        waFindLastInRow(cell).insertAdjacentElement('afterend', detail);
        detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function waBuildDetailEl(mod) {
        var sub = mod.Group || '';
        if (mod.Version) sub += (sub ? '  ·  v' : 'v') + mod.Version;

        var dateLabel = mod.InitAGIDate
            ? mod.InitAGIDate + '  (init.agi)'
            : (mod.InstallDate || '—');

        var rows = [
            { k: waLocale.getString('addAndRemove/locationKey',    'Location'),    v: mod.InstallDir || '—' },
            { k: waLocale.getString('addAndRemove/lastUpdateKey',  'Last update'), v: dateLabel },
            { k: waLocale.getString('addAndRemove/sizeKey',        'Size'),        v: waBytes(mod.DiskSpace) }
        ];
        var infoHTML = rows.map(function (r) {
            return '<span class="wa-info-key">' + waEsc(r.k) + '</span>' +
                   '<span class="wa-info-val">' + waEsc(r.v) + '</span>';
        }).join('');

        var delDisabled = mod.Uninstallable ? '' : ' disabled';

        var el = document.createElement('div');
        el.className = 'wa-inline-detail';
        el.innerHTML =
            '<div id="wa-detail-head">' +
                '<img id="wa-detail-icon" src="../../' + waEsc(mod.IconPath) + '" ' +
                    'onerror="this.src=\'../../SystemAO/system_setting/img/small_icon.png\'" alt="">' +
                '<div id="wa-detail-names">' +
                    '<div id="wa-detail-name">'  + waEsc(mod.Name) + '</div>' +
                    '<div id="wa-detail-sub">'   + waEsc(sub)      + '</div>' +
                '</div>' +
            '</div>' +
            '<div id="wa-detail-divider"></div>' +
            '<div id="wa-detail-desc">' + waEsc(mod.Desc || '') + '</div>' +
            '<div class="wa-info-grid">' + infoHTML + '</div>' +
            '<div id="wa-detail-footer">' +
                '<button class="wa-btn" onclick="waCloseDetail()">' + waLocale.getString('addAndRemove/closeBtn', 'Close') + '</button>' +
                '<button class="wa-btn danger" id="wa-detail-del"' + delDisabled +
                    ' data-name="' + waEsc(mod.Name) + '" onclick="waDeleteCurrent()">' + waLocale.getString('addAndRemove/deleteAppBtn', 'Delete App') + '</button>' +
            '</div>';
        return el;
    }

    window.waCloseDetail = function () {
        var old = document.querySelector('.wa-inline-detail');
        if (old) old.remove();
        if (waSelCell) { waSelCell.classList.remove('selected'); waSelCell = null; }
    };

    /* ── Delete ─────────────────────────────────────────────── */
    window.waDeleteByIdx = function (e, idx) {
        e.stopPropagation();
        var mod = waMods[idx];
        if (!mod || !mod.Uninstallable) return;
        var _cmsg = waLocale.getString('addAndRemove/confirmRemove', 'Permanently remove "{name}"?\nThis cannot be undone.').replace('{name}', mod.Name);
        if (!confirm(_cmsg)) return;
        waDoDelete(mod.Name);
    };

    window.waDeleteCurrent = function () {
        var btn  = document.querySelector('#wa-detail-del');
        var name = btn && btn.getAttribute('data-name');
        if (!name) return;
        var _cmsg = waLocale.getString('addAndRemove/confirmRemove', 'Permanently remove "{name}"?\nThis cannot be undone.').replace('{name}', name);
        if (!confirm(_cmsg)) return;
        btn.disabled = true;
        waDoDelete(name);
    };

    function waDoDelete(name) {
        $.ajax({
            url:    '../../system/module/install',
            method: 'POST',
            data:   { opr: 'remove', module: name },
            success: function (data) {
                if (data && data.error) {
                    waMsg('err', data.error);
                    var b = document.getElementById('wa-detail-del');
                    if (b) b.disabled = false;
                } else {
                    waMsg('ok', waLocale.getString('addAndRemove/removedOk', '"{name}" removed successfully.').replace('{name}', name));
                    waLoadGrid();
                    waNotifyDesktop();
                }
            },
            error: function () { waMsg('err', waLocale.getString('addAndRemove/removeFail', 'Removal failed.')); }
        });
    }

    /* ── Boot ──────────────────────────────────────────────── */
    waTheme();
    window.detailPageThemeCallback = function(isDark) {
        var el = document.getElementById('webapp-root');
        if (el) el.classList.toggle('dark', isDark);
    };
    waInitDrop();
    waLoadGrid();
    if (typeof NewAppLocale !== 'undefined') {
        waLocale = NewAppLocale();
        waLocale.init('../locale/system_settings/addAndRemove.json', function () {
            waLocale.translate();
        });
    }})();
</script>
