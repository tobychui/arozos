<iframe id="managerFrame" src="../info/taskManager.html" style="border: 0px solid transparent; display: block; width: 100%;">

</iframe>
<script>
    var managerInIframe = true;
    resizeIframe();
    $(window).on("resize", function(){
        resizeIframe();
    })
    function resizeIframe(){
        $("#managerFrame").css({
            "width": "100%",
            "height": "100vh",
        });
    }

    /* Receive theme change from system settings and forward into the iframe */
    window.detailPageThemeCallback = function(isDark) {
        try {
            var fw = document.getElementById('managerFrame').contentWindow;
            if (fw && typeof fw.desktopThemeChanged === 'function') {
                fw.desktopThemeChanged(isDark ? 'dark' : 'light');
            }
        } catch(e) {}
    };

</script>
