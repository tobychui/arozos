<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Group List</title>
    <script src="../../script/jquery.min.js"></script>
    <script src="../../script/ao_module.js"></script>
    <script src="../../script/applocale.js"></script>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; }

    #gr-root {
        --gr-text:        #1d1d1f;
        --gr-dim:         #6e6e73;
        --gr-muted:       #98989d;
        --gr-divider:     #d2d2d7;
        --gr-hover:       rgba(0,0,0,0.045);
        --gr-active:      rgba(0,0,0,0.09);
        --gr-selected:    rgba(0,113,227,0.08);
        --gr-accent:      #0071e3;
        --gr-danger:      #ff3b30;
        --gr-success:     #34c759;
        --gr-bg:          #ffffff;
        --gr-card-bg:     #f5f5f7;
        --gr-card-border: #e5e5ea;

        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        color: var(--gr-text);
        background: var(--gr-bg);
        border-radius: 0.6em;
    }

    #gr-root.dark {
        --gr-text:        #f0f0f0;
        --gr-dim:         #a0a0a5;
        --gr-muted:       #ececee;
        --gr-divider:     #3a3a3c;
        --gr-hover:       rgba(255,255,255,0.06);
        --gr-active:      rgba(255,255,255,0.12);
        --gr-selected:    rgba(41,151,255,0.12);
        --gr-accent:      #2997ff;
        --gr-danger:      #ff453a;
        --gr-success:     #30d158;
        --gr-bg:          #2b2b2b;
        --gr-card-bg:     #3a3a3c;
        --gr-card-border: #48484a;
    }

    #gr-page { padding: 16px 0 24px; }

    /* ── Section label ── */
    .gr-section-label {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0 16px;
        margin: 12px 0 6px;
    }

    /* ── Toolbar ── */
    #gr-toolbar { padding: 4px 12px 10px; }
    #gr-btn-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .gr-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 13px;
        border-radius: 6px;
        border: 1px solid var(--gr-card-border);
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.1s, opacity 0.1s;
        outline: none;
        background: var(--gr-card-bg);
        color: var(--gr-text);
        white-space: nowrap;
        text-decoration: none;
    }
    .gr-btn:hover  { background: var(--gr-hover); }
    .gr-btn:active { background: var(--gr-active); }
    .gr-btn.primary { background: var(--gr-accent); color: #fff; border-color: var(--gr-accent); }
    .gr-btn.primary:hover { opacity: 0.85; }
    .gr-btn.danger  { color: var(--gr-danger); border-color: var(--gr-danger); background: transparent; }
    .gr-btn.danger:hover { background: rgba(255,59,48,0.08); }
    #gr-root.dark .gr-btn.danger:hover { background: rgba(255,69,58,0.13); }
    .gr-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── List card ── */
    .gr-list {
        border: 1px solid var(--gr-divider);
        border-radius: 10px;
        overflow: hidden;
        margin: 0 12px 6px;
        background: var(--gr-bg);
    }

    /* ── Column header ── */
    #gr-col-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: var(--gr-card-bg);
        border-bottom: 1px solid var(--gr-divider);
    }
    .gr-col-name   { flex: 0 0 140px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gr-muted); }
    .gr-col-access { flex: 1; font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gr-muted); }
    .gr-col-admin  { flex: 0 0 80px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gr-muted); text-align: center; }
    .gr-col-quota  { flex: 0 0 110px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gr-muted); text-align: right; }

    /* ── Group rows ── */
    .gr-group-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--gr-divider);
        cursor: pointer;
        transition: background 0.08s;
        user-select: none;
    }
    .gr-group-row:last-child { border-bottom: none; }
    .gr-group-row:hover { background: var(--gr-hover); }
    .gr-group-row.selected { background: var(--gr-selected); }

    .gr-group-name {
        flex: 0 0 140px;
        font-size: 13px;
        font-weight: 600;
        color: var(--gr-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .gr-group-access {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        align-items: center;
    }
    .gr-group-admin {
        flex: 0 0 80px;
        text-align: center;
        font-size: 12px;
    }
    .gr-group-quota {
        flex: 0 0 110px;
        text-align: right;
        font-size: 12.5px;
        color: var(--gr-dim);
    }

    /* ── Badges ── */
    .gr-badge {
        display: inline-flex;
        align-items: center;
        font-size: 10.5px;
        padding: 2px 7px;
        border-radius: 20px;
        font-weight: 500;
    }
    .gr-badge.admin  { background: rgba(52,199,89,0.13);  color: var(--gr-success); }
    .gr-badge.module { background: rgba(0,113,227,0.10);  color: var(--gr-accent); }
    .gr-badge.all    { background: rgba(52,199,89,0.13);  color: var(--gr-success); }
    .gr-badge.none   { background: rgba(155,155,160,0.12); color: var(--gr-muted); }
    .gr-badge.noadmin{ background: rgba(155,155,160,0.12); color: var(--gr-muted); }
    #gr-root.dark .gr-badge.admin  { background: rgba(48,209,88,0.15); }
    #gr-root.dark .gr-badge.all    { background: rgba(48,209,88,0.15); }
    #gr-root.dark .gr-badge.module { background: rgba(41,151,255,0.15); }

    /* ── Empty / loading ── */
    .gr-empty {
        text-align: center;
        padding: 32px 16px;
        color: var(--gr-muted);
        font-size: 13px;
    }

    /* ── Delete panel ── */
    #gr-delete-panel {
        display: none;
        border: 1px solid var(--gr-danger);
        border-radius: 10px;
        margin: 0 12px 10px;
        background: var(--gr-bg);
        overflow: hidden;
    }
    #gr-delete-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 14px;
        background: rgba(255,59,48,0.06);
        border-bottom: 1px solid var(--gr-danger);
    }
    #gr-root.dark #gr-delete-panel-header { background: rgba(255,69,58,0.10); }
    .gr-del-title {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--gr-danger);
    }
    .gr-del-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gr-danger);
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
        opacity: 0.7;
    }
    .gr-del-close:hover { opacity: 1; }
    #gr-delete-panel-body { padding: 12px 14px; }
    .gr-del-action-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--gr-dim);
        margin-bottom: 8px;
    }
    .gr-radio-row {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 6px 0;
        cursor: pointer;
        user-select: none;
    }
    .gr-radio-row input[type="radio"] {
        accent-color: var(--gr-danger);
        flex-shrink: 0;
        margin-top: 3px;
        cursor: pointer;
    }
    .gr-radio-label { font-size: 13px; color: var(--gr-text); font-weight: 500; }
    .gr-radio-hint  { font-size: 11.5px; color: var(--gr-muted); margin-top: 2px; }
    .gr-radio-extra { margin-top: 6px; margin-left: 22px; display: none; }
    .gr-del-select {
        font-size: 13px;
        font-family: inherit;
        color: var(--gr-text);
        background: var(--gr-card-bg);
        border: 1px solid var(--gr-card-border);
        border-radius: 6px;
        padding: 5px 8px;
        outline: none;
        cursor: pointer;
        width: 100%;
        max-width: 260px;
    }
    .gr-del-select:focus { border-color: var(--gr-accent); }
    .gr-del-divider { border: none; border-top: 1px solid var(--gr-divider); margin: 10px 0; }
    .gr-affected-box {
        border: 1px solid var(--gr-divider);
        border-radius: 8px;
        overflow: hidden;
        max-height: 140px;
        overflow-y: auto;
        font-size: 12.5px;
        margin-top: 6px;
    }
    .gr-affected-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 12px;
        border-bottom: 1px solid var(--gr-divider);
    }
    .gr-affected-row:last-child { border-bottom: none; }
    .gr-affected-username { font-weight: 500; color: var(--gr-text); }
    .gr-affected-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 20px;
        background: rgba(255,59,48,0.12);
        color: var(--gr-danger);
    }
    .gr-del-warn {
        font-size: 12px;
        color: var(--gr-danger);
        font-weight: 500;
        margin-top: 8px;
        display: none;
    }

    /* ── Self-membership warning ── */
    #gr-self-warn {
        display: none;
        font-size: 12px;
        font-weight: 500;
        color: #92400e;
        background: rgba(146,64,14,0.07);
        border: 1px solid rgba(146,64,14,0.22);
        border-radius: 6px;
        padding: 7px 10px;
        margin-top: 10px;
        line-height: 1.5;
    }
    #gr-root.dark #gr-self-warn {
        color: #fbbf24;
        background: rgba(251,191,36,0.08);
        border-color: rgba(251,191,36,0.22);
    }
    .gr-del-confirm-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        gap: 8px;
    }
    .gr-del-hint { font-size: 12px; color: var(--gr-danger); font-weight: 500; }
    .gr-btn-del-confirm {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 13px;
        border-radius: 6px;
        border: 1px solid var(--gr-danger);
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        outline: none;
        background: var(--gr-danger);
        color: #fff;
        white-space: nowrap;
        transition: opacity 0.1s;
    }
    .gr-btn-del-confirm:hover { opacity: 0.85; }
    .gr-btn-del-confirm.loading { opacity: 0.55; cursor: default; pointer-events: none; }

    /* ── Toast ── */
    #gr-toast {
        display: none;
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 9100;
        background: #1f1f1f;
        border-radius: 10px;
        padding: 10px 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.22);
        max-width: min(340px, calc(100vw - 24px));
        min-width: 160px;
        text-align: center;
        pointer-events: none;
    }
    #gr-toast.dark { background: #2d2d2d; }
    #gr-toast.err  { background: #c42b1c; }
    #gr-toast-msg  { font-size: 13px; font-weight: 500; color: #fff; }
    </style>
</head>
<body>

<div id="gr-toast"><div id="gr-toast-msg"></div></div>

<div id="gr-root">
<div id="gr-page">

    <div class="gr-section-label" locale="group/section-groups">Permission Groups</div>

    <div class="gr-list">
        <div id="gr-col-header">
            <div class="gr-col-name"  locale="group/col-name">Group</div>
            <div class="gr-col-access" locale="group/col-access">Module Access</div>
            <div class="gr-col-admin"  locale="group/col-admin">Admin</div>
            <div class="gr-col-quota"  locale="group/col-quota">Quota</div>
        </div>
        <div id="groupList">
            <div class="gr-empty" locale="group/loading">Loading&#8230;</div>
        </div>
    </div>

    <div id="gr-toolbar">
        <div id="gr-btn-row">
            <button class="gr-btn primary" onclick="newgroupInterface()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                <span locale="group/new">New Group</span>
            </button>
            <button id="editGroupButton" class="gr-btn disabled" onclick="openEditWindow()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2L4 10H2v-2L8.5 1.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span locale="group/edit">Edit</span>
            </button>
            <button id="removeGroupButton" class="gr-btn danger disabled" onclick="openDeletePanel()" style="margin-left:auto;">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1 3h10M4 3V2h4v1M5 6v3M7 6v3M2 3l.8 8h6.4L10 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span locale="group/remove">Remove</span>
            </button>
        </div>
    </div>

    <!-- Delete group panel -->
    <div id="gr-delete-panel">
        <div id="gr-delete-panel-header">
            <span class="gr-del-title" locale="group/del-title">Delete Group</span>
            <button class="gr-del-close" onclick="closeDeletePanel()" title="Close">&times;</button>
        </div>
        <div id="gr-delete-panel-body">

            <div class="gr-del-action-label" locale="group/del-action-label">What should happen to users currently in this group?</div>

            <label class="gr-radio-row">
                <input type="radio" name="gr-del-action" value="reassign" id="gr-radio-reassign" onchange="grOnActionChange()" checked>
                <div>
                    <div class="gr-radio-label" locale="group/del-action-reassign">Move users to another group</div>
                    <div class="gr-radio-hint" locale="group/del-action-reassign-hint">All users in this group will be assigned to the selected group instead.</div>
                    <div class="gr-radio-extra" id="gr-reassign-extra">
                        <select id="gr-target-group" class="gr-del-select"></select>
                    </div>
                </div>
            </label>

            <label class="gr-radio-row">
                <input type="radio" name="gr-del-action" value="removeonly" onchange="grOnActionChange()">
                <div>
                    <div class="gr-radio-label" locale="group/del-action-removeonly">Remove group from users, keep accounts</div>
                    <div class="gr-radio-hint" locale="group/del-action-removeonly-hint">User accounts will remain but will no longer belong to this group. Users with only this group will lose their interface module.</div>
                </div>
            </label>

            <label class="gr-radio-row">
                <input type="radio" name="gr-del-action" value="deleteusers" onchange="grOnActionChange()">
                <div>
                    <div class="gr-radio-label" locale="group/del-action-deleteusers">Delete all users in this group</div>
                    <div class="gr-radio-hint" locale="group/del-action-deleteusers-hint">All user accounts in this group will be permanently removed.</div>
                </div>
            </label>

            <hr class="gr-del-divider">

            <div id="gr-affected-area">
                <div class="gr-del-action-label" locale="group/del-affected-label">Affected Users</div>
                <div id="gr-affected-list" class="gr-affected-box">
                    <div class="gr-empty" style="padding:12px;" locale="group/del-loading">Loading&hellip;</div>
                </div>
                <div id="gr-single-group-warn" class="gr-del-warn" locale="group/del-warn-single">
                    Warning: Some users are only in this group and will lose their interface module after removal.
                </div>
            </div>

            <div id="gr-self-warn"></div>

            <div class="gr-del-confirm-row">
                <span class="gr-del-hint" locale="group/del-confirm-hint">This action cannot be undone.</span>
                <button class="gr-btn-del-confirm" id="gr-confirm-del-btn" onclick="grConfirmDelete(this)">
                    <span locale="group/del-confirm-btn">Confirm &amp; Delete</span>
                </button>
            </div>

        </div>
    </div>

</div>
</div>

<script>
/* ── Theme ── */
function grApplyTheme(dark) {
    document.getElementById('gr-root').classList.toggle('dark', dark);
    document.getElementById('gr-toast').classList.toggle('dark', dark);
}

(function() {
    if (typeof(preferredTheme) !== 'undefined' && preferredTheme){
        grApplyTheme(preferredTheme === 'dark' || preferredTheme === 'darkTheme');
        return;
    }
    try {
        if (typeof ao_module_getSystemThemeColor === 'function') {
            ao_module_getSystemThemeColor(function(c) { grApplyTheme(c !== 'whiteTheme'); });
        } else {
            var t = (typeof preferredTheme !== 'undefined' ? preferredTheme : null) ||
                    (parent && typeof parent.preferredTheme !== 'undefined' ? parent.preferredTheme : null);
            if (t) grApplyTheme(t === 'dark' || t === 'darkTheme');
        }
    } catch(e) {}
})();

/* ── Locale ── */
var grLocale = null;
var groupPermissionInfo = {};
var currentSelectedGroup = "";

$(document).ready(function() {
    if (typeof applocale !== 'undefined' && applocale) {
        grLocale = NewAppLocale();
        grLocale.init('../locale/users/group.json', function() {
            grLocale.translate();
            loadGroupList();
        });
    } else {
        loadGroupList();
    }
});

/* ── Load group list ── */
function loadGroupList() {
    var loadingText = grLocale ? grLocale.getString('group/loading', 'Loading\u2026') : 'Loading\u2026';
    $('#groupList').html('<div class="gr-empty">' + loadingText + '</div>');
    currentSelectedGroup = "";
    $('#editGroupButton').addClass('disabled');
    $('#removeGroupButton').addClass('disabled');

    $.get('../../system/permission/listgroup?showper=true', function(data) {
        if (data.error !== undefined) { showGrToast(data.error, true); return; }

        var keys = Object.keys(data);
        if (keys.length === 0) {
            var emptyText = grLocale ? grLocale.getString('group/empty', 'No groups found') : 'No groups found';
            $('#groupList').html('<div class="gr-empty">' + emptyText + '</div>');
            return;
        }

        groupPermissionInfo = data;
        $('#groupList').empty();

        keys.forEach(function(key) {
            var value = data[key];
            var moduleList = value[0];
            var isAdmin    = value[1];
            var quotaBytes = value[2];

            /* Access badge(s) */
            var accessHtml;
            if (moduleList.includes('*')) {
                var allLabel = grLocale ? grLocale.getString('group/access-all', 'All Modules') : 'All Modules';
                accessHtml = '<span class="gr-badge all">' + allLabel + '</span>';
            } else if (!moduleList || moduleList.length === 0) {
                var noneLabel = grLocale ? grLocale.getString('group/access-none', 'No Access') : 'No Access';
                accessHtml = '<span class="gr-badge none">' + noneLabel + '</span>';
            } else {
                accessHtml = moduleList.slice(0, 4).map(function(m) {
                    return '<span class="gr-badge module">' + escHtml(m) + '</span>';
                }).join('');
                if (moduleList.length > 4) {
                    accessHtml += '<span class="gr-badge none">+' + (moduleList.length - 4) + '</span>';
                }
            }

            /* Admin badge */
            var adminHtml;
            if (isAdmin) {
                var yesLabel = grLocale ? grLocale.getString('group/admin-yes', 'Yes') : 'Yes';
                adminHtml = '<span class="gr-badge admin">' + yesLabel + '</span>';
            } else {
                var noLabel = grLocale ? grLocale.getString('group/admin-no', 'No') : 'No';
                adminHtml = '<span class="gr-badge noadmin">' + noLabel + '</span>';
            }

            /* Quota */
            var quotaLabel;
            if (quotaBytes === 0) {
                quotaLabel = grLocale ? grLocale.getString('group/quota-readonly', 'Read Only') : 'Read Only';
            } else if (quotaBytes === -1) {
                quotaLabel = grLocale ? grLocale.getString('group/quota-unlimited', 'Unlimited') : 'Unlimited';
            } else {
                quotaLabel = bytesToSize(quotaBytes);
            }

            var keyEsc = escHtml(key);
            var keyJs  = key.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            $('#groupList').append(
                '<div class="gr-group-row" onclick="grSelectGroup(\'' + keyJs + '\', this)">'+
                    '<div class="gr-group-name">' + keyEsc + '</div>' +
                    '<div class="gr-group-access">' + accessHtml + '</div>' +
                    '<div class="gr-group-admin">' + adminHtml + '</div>' +
                    '<div class="gr-group-quota">' + escHtml(quotaLabel) + '</div>' +
                '</div>'
            );
        });
    });
}

/* ── Row selection ── */
function grSelectGroup(groupName, rowEl) {
    $('.gr-group-row').removeClass('selected');
    $(rowEl).addClass('selected');
    currentSelectedGroup = groupName;
    closeDeletePanel();

    $('#editGroupButton').removeClass('disabled');
    if (groupName === 'administrator') {
        $('#removeGroupButton').addClass('disabled');
    } else {
        $('#removeGroupButton').removeClass('disabled');
    }
}

/* ── Open edit window ── */
function openEditWindow() {
    ao_module_newfw({
        url: 'SystemAO/users/editgroup.html#' + encodeURIComponent(JSON.stringify(currentSelectedGroup)),
        width: 560,
        height: 768,
        appicon: 'SystemAO/users/img/users-white.svg',
        title: grLocale ? grLocale.getString('group/edit-title', 'Edit User Group') : 'Edit User Group',
        parent: ao_module_windowID,
        callback: 'confirmCreateHandler'
    });
}

/* ── New group ── */
function newgroupInterface() {
    ao_module_newfw({
        url: 'SystemAO/users/newgroup.html',
        width: 560,
        height: 768,
        appicon: 'SystemAO/users/img/users-white.svg',
        title: grLocale ? grLocale.getString('group/new-title', 'Create User Group') : 'Create User Group',
        parent: ao_module_windowID,
        callback: 'confirmCreateHandler'
    });
}

function confirmCreateHandler(data) {
    if (data) loadGroupList();
}

/* ── Delete panel ── */
var grDeletePreviewLoaded = false;
var grAffectedUsers = [];
var grCurrentUsername = "";

// Fetch the current logged-in username once so we can warn if the admin is
// about to delete a group they themselves belong to.
$.get('../../system/desktop/user', function(data) {
    if (data && data.Username) { grCurrentUsername = data.Username; }
});

function openDeletePanel() {
    if (!currentSelectedGroup || currentSelectedGroup === 'administrator') return;
    grDeletePreviewLoaded = false;
    grAffectedUsers = [];

    // Reset to defaults
    document.getElementById('gr-radio-reassign').checked = true;
    document.getElementById('gr-reassign-extra').style.display = 'block';
    document.getElementById('gr-single-group-warn').style.display = 'none';
    document.getElementById('gr-self-warn').style.display = 'none';
    document.getElementById('gr-affected-list').innerHTML =
        '<div class="gr-empty" style="padding:12px;">' +
        (grLocale ? grLocale.getString('group/del-loading', 'Loading\u2026') : 'Loading\u2026') + '</div>';

    document.getElementById('gr-delete-panel').style.display = 'block';
    grLoadDeletePreview();
}

function closeDeletePanel() {
    var panel = document.getElementById('gr-delete-panel');
    if (panel) panel.style.display = 'none';
}

function grOnActionChange() {
    var action = document.querySelector('input[name="gr-del-action"]:checked').value;
    document.getElementById('gr-reassign-extra').style.display = (action === 'reassign') ? 'block' : 'none';

    var warn = document.getElementById('gr-single-group-warn');
    if (action === 'removeonly' && grDeletePreviewLoaded) {
        var hasSingle = grAffectedUsers.some(function(u) { return u.groupCount <= 1; });
        warn.style.display = hasSingle ? 'block' : 'none';
    } else {
        warn.style.display = 'none';
    }

    if (grDeletePreviewLoaded) { grUpdateSelfWarn(); }
}

function grLoadDeletePreview() {
    // Load other groups for the reassign dropdown
    $.get('../../system/permission/listgroup', function(data) {
        var sel = document.getElementById('gr-target-group');
        sel.innerHTML = '';
        var others = (data || []).filter(function(g) { return g !== currentSelectedGroup; });
        others.forEach(function(g) {
            var opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            if (g === 'default') opt.selected = true;
            sel.appendChild(opt);
        });
    });

    // Load affected users
    $.get('../../system/permission/listgroupusers', { groupname: currentSelectedGroup }, function(data) {
        grAffectedUsers = data || [];
        grDeletePreviewLoaded = true;

        var listBox = document.getElementById('gr-affected-list');
        if (grAffectedUsers.length === 0) {
            var emptyMsg = grLocale ? grLocale.getString('group/del-no-affected', 'No users are in this group.') : 'No users are in this group.';
            listBox.innerHTML = '<div class="gr-empty" style="padding:12px;">' + emptyMsg + '</div>';
        } else {
            listBox.innerHTML = '';
            var onlyLabel = grLocale ? grLocale.getString('group/del-only-group', 'Only group') : 'Only group';
            grAffectedUsers.forEach(function(u) {
                var row = document.createElement('div');
                row.className = 'gr-affected-row';
                var badge = (u.groupCount <= 1)
                    ? '<span class="gr-affected-badge">' + onlyLabel + '</span>' : '';
                row.innerHTML = '<span class="gr-affected-username">' + escHtml(u.username) + '</span>' + badge;
                listBox.appendChild(row);
            });
        }
        grOnActionChange();
    }).fail(function() {
        document.getElementById('gr-affected-list').innerHTML =
            '<div class="gr-empty" style="padding:12px;color:var(--gr-danger);">' +
            (grLocale ? grLocale.getString('group/del-load-error', 'Failed to load users.') : 'Failed to load users.') + '</div>';
    });
}

/* ── Self-membership warning helper ── */
function grUpdateSelfWarn() {
    var el = document.getElementById('gr-self-warn');
    if (!el || !grCurrentUsername) return;

    var isSelf = grAffectedUsers.some(function(u) { return u.username === grCurrentUsername; });
    if (!isSelf) { el.style.display = 'none'; return; }

    var action = document.querySelector('input[name="gr-del-action"]:checked');
    var val = action ? action.value : '';
    if (val === 'deleteusers') {
        el.textContent = '\u26a0\ufe0f ' + (grLocale
            ? grLocale.getString('group/del-self-warn-deleteusers',
                'You are in this group. Your account will not be deleted \u2014 only your group membership will be removed.')
            : 'You are in this group. Your account will not be deleted \u2014 only your group membership will be removed.');
    } else {
        el.textContent = '\u26a0\ufe0f ' + (grLocale
            ? grLocale.getString('group/del-self-warn-general', 'You are a member of this group.')
            : 'You are a member of this group.');
    }
    el.style.display = 'block';
}

function grConfirmDelete(btn) {
    var action      = document.querySelector('input[name="gr-del-action"]:checked').value;
    var targetgroup = document.getElementById('gr-target-group').value;
    var groupname   = currentSelectedGroup;

    var confirmMsg = grLocale
        ? grLocale.getString('group/del-confirm-msg', 'Delete group "' + groupname + '"? This cannot be undone.').replace('{group}', groupname)
        : 'Delete group "' + groupname + '"? This cannot be undone.';
    if (!confirm(confirmMsg)) return;

    $(btn).addClass('loading');
    $.ajax({
        url: '../../system/permission/delgroupwithhandling',
        method: 'POST',
        data: {
            groupname:   groupname,
            action:      action,
            targetgroup: targetgroup
        },
        success: function(data) {
            $(btn).removeClass('loading');
            if (data && data.error !== undefined) {
                showGrToast(data.error, true);
                return;
            }
            closeDeletePanel();
            var msg = grLocale ? grLocale.getString('group/del-success', 'Group deleted successfully.') : 'Group deleted successfully.';
            showGrToast(msg, false);
            loadGroupList();
        },
        error: function(xhr) {
            $(btn).removeClass('loading');
            var msg = xhr.status === 403
                ? (grLocale ? grLocale.getString('group/del-forbidden', 'Access denied.') : 'Access denied.')
                : (grLocale ? grLocale.getString('group/del-error', 'Failed to delete group.') : 'Failed to delete group.');
            showGrToast(msg, true);
        }
    });
}

/* ── Helpers ── */
function bytesToSize(bytes) {
    var sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
    if (bytes === 0) return '0 Byte';
    var i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
    return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
}

function showGrToast(msg, isErr) {
    $('#gr-toast').toggleClass('err', !!isErr);
    $('#gr-toast-msg').text(isErr ? '\u2715 ' + msg : '\u2713 ' + msg);
    $('#gr-toast').stop(true, true).fadeIn(160).delay(2800).fadeOut(380);
}

function escHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
