<!DOCTYPE html>
<html>
    <head>
        <title>System Settings</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="../../script/semantic/semantic.min.css">
        <link rel="stylesheet" href="main.css">
        <script type="text/javascript" src="../../script/jquery.min.js"></script>
        <script type="text/javascript" src="../../script/semantic/semantic.min.js"></script>
        <script type="text/javascript" src="../../script/ao_module.js"></script>
        <script type="text/javascript" src="../../script/applocale.js"></script>
    </head>
    <body>
        <div id="app">

            <!-- Mobile sidebar overlay -->
            <div id="sidebar-overlay" onclick="closeSidebar()"></div>

            <!-- Mobile menu toggle button (top-right, shown only on narrow screens) -->
            <button id="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 5h16M2 10h16M2 15h16" stroke="currentColor" stroke-width="1.6"
                          stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Left sidebar -->
            <div id="sidebar">
                
                <div id="sidebar-title">
                    <img src="img/small_icon.png" onerror="this.style.display='none'">
                    Settings
                </div>
                <!-- Back button — shown when in sub-category (detail) view -->
                <div id="back-row" onclick="goBack()">
                    <svg class="back-chevron" viewBox="0 0 16 16" fill="none">
                        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="back-label">Settings</span>
                </div>
                <!-- Group name shown above sub-category nav items -->
                <div id="group-label"></div>
                <div id="sidebar-nav"></div>
            </div>

            <!-- Right content -->
            <div id="main">

                <!-- Level 1: card grid of sub-categories for the selected group -->
                <div id="overview">
                    <div id="overview-inner">
                        <div id="overview-title">Settings</div>
                        <div id="info-banner"></div>
                        <div id="card-grid"></div>
                    </div>
                </div>

                <!-- Level 2: loaded setting page with padded inner wrapper -->
                <div id="detail">
                    <div id="detail-inner"></div>
                </div>

            </div>
        </div>

        <!-- Toast notification -->
        <div id="msgbox"></div>

        <script type="text/javascript" src="main.js"></script>
    </body>
</html>
