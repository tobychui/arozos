<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Webapp Unit Tests</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 24px; color: #1f1f1f; }
        h1 { font-size: 18px; }
        #summary { font-weight: 600; margin: 12px 0; padding: 10px 14px; border-radius: 8px; }
        #summary.ok { background: #e6f4ea; color: #107c10; }
        #summary.bad { background: #fdecea; color: #c42b1c; }
        ul { list-style: none; padding: 0; }
        li { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        li.pass::before { content: "\2713"; color: #107c10; margin-right: 8px; font-weight: 700; }
        li.fail::before { content: "\2717"; color: #c42b1c; margin-right: 8px; font-weight: 700; }
        li.fail { color: #c42b1c; }
    </style>
</head>
<body>
    <h1>Notification Webapp Unit Tests</h1>
    <div id="summary">Running…</div>
    <ul id="results"></ul>

    <script src="notification.js"></script>
    <script src="notification.test.js"></script>
    <script>
        (function () {
            var results = NotificationTests.run();
            var list = document.getElementById("results");
            var passed = 0;
            results.forEach(function (r) {
                if (r.pass) passed++;
                var li = document.createElement("li");
                li.className = r.pass ? "pass" : "fail";
                li.textContent = r.message;
                list.appendChild(li);
            });
            var summary = document.getElementById("summary");
            var allPass = passed === results.length;
            summary.className = allPass ? "ok" : "bad";
            summary.textContent = passed + "/" + results.length + " tests passed" + (allPass ? "" : " — see failures below");
        })();
    </script>
</body>
</html>
