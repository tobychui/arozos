<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <!-- GitApp icon: a commit graph with a branch splitting off -->
    <rect x="2" y="2" width="60" height="60" rx="13" fill="#24292f"/>
    <g stroke="#f0f6fc" stroke-width="4" fill="none" stroke-linecap="round">
        <!-- trunk -->
        <path d="M22 16 V48"/>
        <!-- branch out and back -->
        <path d="M22 27 H36 a6 6 0 0 1 6 6 V38"/>
    </g>
    <g fill="#f0f6fc">
        <circle cx="22" cy="16" r="6"/>
        <circle cx="22" cy="48" r="6"/>
    </g>
    <circle cx="42" cy="42" r="6" fill="#3fb950"/>
</svg>
