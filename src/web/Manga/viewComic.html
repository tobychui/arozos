<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1"/>
    <meta name="theme-color" content="#0e0e10"/>
    <script src="../script/jquery.min.js"></script>
    <script src="../script/ao_module.js"></script>
    <script src="../script/applocale.js"></script>
    <title>Manga Reader</title>
    <style>
        :root {
            --accent:   #ffd60a;
            --accent-h: #e8c200;
            --surface:  #1a1a1c;
            --surface2: #242426;
            --border:   #333336;
            --text:     #f0f0f5;
            --text2:    #9090a0;
            --r:        10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #0e0e10;
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            min-height: 100%;
        }

        /* ── Reader ── */
        #reader {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;     /* visual cue: tap to toggle HUD */
            padding-bottom: 0;
        }
        .page-img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            user-select: none;
            -webkit-user-drag: none;
        }
        /* PC mode: narrows the reading column */
        body.pc-mode #reader { max-width: 700px; margin: 0 auto; }

        /* ── HUD shared ── */
        .hud {
            position: fixed; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            transition: opacity 0.25s, transform 0.25s;
        }
        .hud.hidden { opacity: 0; pointer-events: none; }

        /* ── Top HUD ── */
        #hudTop {
            top: 0;
            padding: 10px 12px 32px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
            transform: translateY(0);
        }
        #hudTop.hidden { transform: translateY(-100%); }

        .hud-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.9);
            cursor: pointer; font-size: 1em;
            padding: 5px 8px; border-radius: 6px;
            transition: background 0.12s;
            white-space: nowrap;
            font-family: inherit;
            flex-shrink: 0;
        }
        .hud-btn:hover { background: rgba(255,255,255,0.14); }

        #hudTitleWrap {
            flex: 1;
            text-align: center;
            overflow: hidden;
            min-width: 0;
        }
        #hudMangaTitle {
            font-size: 1em;
            color: rgba(255,255,255,0.6);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #hudChapterTitle {
            font-size: 1em;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Bottom HUD ── */
        #hudBottom {
            bottom: 0;
            padding: 32px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
            transform: translateY(0);
        }
        #hudBottom.hidden { transform: translateY(100%); }

        .nav-btn {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            cursor: pointer; font-size: 1em;
            padding: 6px 13px; border-radius: 6px;
            transition: background 0.12s;
            font-family: inherit; white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.20); }
        .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        #pageIndicator {
            flex: 1; text-align: center;
            font-size: 1em;
            color: rgba(255,255,255,0.55);
        }

        /* ── Chapter end card ── */
        #chapterEnd {
            display: none;
            padding: 44px 20px 60px;
            text-align: center;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .end-label {
            font-size: 1em;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }
        .end-next-name {
            font-size: 1em; font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
        }
        .end-btn {
            padding: 10px 28px;
            background: var(--accent); color: #1a1a1a;
            border: none; border-radius: 8px;
            font-size: 1em; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s;
        }
        .end-btn:hover:not(:disabled) { background: var(--accent-h); }
        .end-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .end-no-more {
            font-size: 1em; color: var(--text2); margin-top: 8px;
        }

        /* ── Chapter selector overlay ── */
        #chapterOverlay {
            display: none;
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(4px);
        }
        #chapterPanel {
            position: absolute;
            top: 0; left: 0; right: 0;
            max-height: 72vh;
            overflow-y: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 14px 20px;
        }
        .ch-overlay-hdr {
            font-size: 1em; font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .ch-list-btns { display: flex; flex-wrap: wrap; gap: 6px; }
        .ch-list-btn {
            padding: 5px 12px;
            font-size: 1em; font-weight: 500;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer; font-family: inherit;
            transition: background 0.12s, color 0.12s;
        }
        .ch-list-btn:hover   { background: var(--accent); color: #1a1a1a; border-color: var(--accent); }
        .ch-list-btn.current { background: var(--accent); color: #1a1a1a; border-color: var(--accent); }

        /* ── Settings panel ── */
        #settingsOverlay {
            display: none;
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(4px);
        }
        #settingsBox {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            width: min(300px, 88vw);
        }
        .settings-hdr {
            font-size: 1em; font-weight: 700;
            color: var(--text); margin-bottom: 16px;
        }
        .setting-row {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 14px; gap: 12px;
        }
        .setting-lbl { font-size: 1em; color: var(--text); }
        .setting-sub { font-size: 1em; color: var(--text2); margin-top: 2px; }

        /* Toggle switch */
        .toggle-sw { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
        .toggle-sw input { display: none; }
        .toggle-track {
            position: absolute; inset: 0;
            background: var(--border); border-radius: 11px;
            cursor: pointer; transition: background 0.2s;
        }
        .toggle-track::after {
            content: ''; position: absolute;
            top: 3px; left: 3px;
            width: 16px; height: 16px;
            background: #fff; border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle-sw input:checked + .toggle-track { background: var(--accent); }
        .toggle-sw input:checked + .toggle-track::after { transform: translateX(18px); }

        .settings-close {
            width: 100%; padding: 9px;
            background: var(--surface2);
            border: none; border-radius: 8px;
            color: var(--text); font-size: 1em; font-weight: 600;
            cursor: pointer; font-family: inherit; margin-top: 4px;
            transition: background 0.12s;
        }
        .settings-close:hover { background: var(--border); }

        /* ── Loading screen ── */
        #loadingScreen {
            position: fixed; inset: 0; z-index: 300;
            background: #0e0e10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; color: var(--text2); font-size: 1em;
        }
        .spin {
            width: 28px; height: 28px;
            border: 3px solid #2a2a2c;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 3px; }

        /* Icon images — all SVGs are white, suits the dark reader perfectly */
        .btn-icon {
            width: 22px; height: 22px;
            display: block;
            flex-shrink: 0;
        }
        /* Buttons that mix icon + text need flex alignment */
        .btn-with-icon {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<!-- Loading screen -->
<div id="loadingScreen">
    <div class="spin"></div>
    <div locale="loading/chapter">Loading chapter…</div>
</div>

<!-- Top HUD -->
<div id="hudTop" class="hud hidden">
    <button class="hud-btn btn-with-icon" id="backBtn">
        <img src="img/icons/back.svg" class="btn-icon" alt=""><span locale="btn/back">Back</span>
    </button>
    <div id="hudTitleWrap">
        <div id="hudMangaTitle"></div>
        <div id="hudChapterTitle"></div>
    </div>
    <button class="hud-btn" id="chaptersBtn" title="Chapter list">
        <img src="img/icons/menu.svg" class="btn-icon" alt="Chapters">
    </button>
    <button class="hud-btn" id="settingsBtn" title="Settings">
        <img src="img/icons/setting.svg" class="btn-icon" alt="Settings">
    </button>
</div>

<!-- Reader (tap to toggle HUD) -->
<div id="reader"></div>

<!-- End-of-chapter card -->
<div id="chapterEnd">
    <div class="end-label" locale="reader/end_chapter">End of chapter</div>
    <div class="end-next-name" id="endNextName"></div>
    <button class="end-btn btn-with-icon" id="nextChEndBtn">
        <span locale="reader/next_chapter">Next Chapter</span>
    </button>
    <div class="end-no-more" id="endNoMore" style="display:none" locale="reader/finished">You've finished the last chapter.</div>
</div>

<!-- Bottom HUD -->
<div id="hudBottom" class="hud hidden">
    <button class="nav-btn btn-with-icon" id="prevChBtn">
        <img src="img/icons/previous.svg" class="btn-icon" alt=""><span locale="btn/prev">Prev</span>
    </button>
    <div id="pageIndicator">— / —</div>
    <button class="nav-btn btn-with-icon" id="nextChBtn">
        <span locale="btn/next">Next</span> <img src="img/icons/next.svg" class="btn-icon" alt="">
    </button>
</div>

<!-- Chapter selector overlay -->
<div id="chapterOverlay">
    <div id="chapterPanel">
        <div class="ch-overlay-hdr btn-with-icon">
            <img src="img/icons/menu.svg" class="btn-icon" alt=""><span locale="overlay/chapters">Chapters</span>
        </div>
        <div class="ch-list-btns" id="chListBtns"></div>
    </div>
</div>

<!-- Settings overlay -->
<div id="settingsOverlay">
    <div id="settingsBox">
        <div class="settings-hdr btn-with-icon">
            <img src="img/icons/setting.svg" class="btn-icon" alt=""><span locale="settings/title">Settings</span>
        </div>
        <div class="setting-row">
            <div>
                <div class="setting-lbl" locale="settings/save_progress">Save Progress</div>
                <div class="setting-sub" locale="settings/save_progress_sub">Return to last read page automatically</div>
            </div>
            <label class="toggle-sw">
                <input type="checkbox" id="toggleProgress">
                <span class="toggle-track"></span>
            </label>
        </div>
        <div class="setting-row">
            <div>
                <div class="setting-lbl" locale="settings/pc_mode">PC Mode</div>
                <div class="setting-sub" locale="settings/pc_mode_sub">Narrows images for wide screens</div>
            </div>
            <label class="toggle-sw">
                <input type="checkbox" id="togglePcMode">
                <span class="toggle-track"></span>
            </label>
        </div>
        <button class="settings-close" id="settingsCloseBtn" locale="btn/close">Close</button>
    </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  Manga Reader – viewComic.html
// ══════════════════════════════════════════════════════════════

// ── Localisation ───────────────────────────────────────────
function t(key, fallback) {
    if (typeof applocale !== 'undefined' && applocale.localData && applocale.localData.keys) {
        return applocale.getString(key, fallback);
    }
    return fallback;
}
if (typeof applocale !== 'undefined') {
    applocale.init("locale/manga.json", function () {
        applocale.translate();
    });
}

var chapterPath  = decodeURIComponent(window.location.hash.substr(1));
var allChapters  = [];   // [{name, path}] natural-sorted
var currentChIdx = -1;
var mangaRootPath = '';  // set once getMangaInfo returns; used for back-navigation
var positions    = [];   // scrollY of top of each page
var currentPage  = 1;
var hudVisible   = false;
var hudTimer     = null;
var saveProgress = false;
var pcMode       = false;
var PROG_KEY     = "manga_prog_";
var SAVE_KEY     = "manga_saveProgress";
var PC_KEY       = "manga_pcMode";

// ── Restore settings ───────────────────────────────────────
saveProgress = (localStorage.getItem(SAVE_KEY) === "true");
pcMode       = (localStorage.getItem(PC_KEY)   === "true");
document.getElementById("toggleProgress").checked = saveProgress;
document.getElementById("togglePcMode").checked   = pcMode;
if (pcMode) document.body.classList.add("pc-mode");

// ── Strip leading "N " prefix from metadata-style chapter names ──
function cleanChName(name) {
    return String(name).replace(/^\d+\s+/, "") || name;
}

// ── Load chapter data ──────────────────────────────────────
ao_module_agirun("Manga/backend/getMangaInfo.js", { folder: chapterPath }, function (data) {
    var pages    = data.pages || [];
    var titleArr = data.title || ["", ""];
    var siblings = data.otherChapterDir || [];
    mangaRootPath = data.mangaRoot || '';

    // Update HUD title
    document.getElementById("hudMangaTitle").textContent   = titleArr[0];
    document.getElementById("hudChapterTitle").textContent = cleanChName(titleArr[1]);
    document.title = titleArr[0] + " – " + cleanChName(titleArr[1]);

    // Build sibling chapter list and find current index
    allChapters = siblings.map(function (p) {
        return { name: p.split("/").pop(), path: p };
    });
    for (var i = 0; i < allChapters.length; i++) {
        if (allChapters[i].path === chapterPath) { currentChIdx = i; break; }
    }
    // Fallback: match by chapter name
    if (currentChIdx === -1) {
        var curName = chapterPath.split("/").pop();
        for (var i = 0; i < allChapters.length; i++) {
            if (allChapters[i].name === curName) { currentChIdx = i; break; }
        }
    }

    // Render pages
    var reader = document.getElementById("reader");
    pages.forEach(function (p) {
        var img = document.createElement("img");
        img.className = "page-img";
        img.alt       = "";
        img.decoding  = "async";
        img.src       = "/media?file=" + encodeURIComponent(p);
        reader.appendChild(img);
    });

    // Render chapter selector
    renderChapterOverlay();

    // Wire up nav buttons
    updateNavButtons();

    // Wait for all images to load, then init
    waitForImages(function () {
        document.getElementById("loadingScreen").style.display = "none";
        calcPositions();
        updatePageIndicator();
        document.getElementById("chapterEnd").style.display = "block";

        // Restore saved progress
        if (saveProgress) {
            var saved = parseInt(localStorage.getItem(PROG_KEY + chapterPath), 10);
            if (saved > 1 && saved <= positions.length) {
                setTimeout(function () {
                    window.scrollTo(0, positions[saved - 1] - 4);
                }, 150);
            }
        }

        showHUD(3500);
    });

}, function () {
    document.getElementById("loadingScreen").innerHTML =
        '<div style="color:#ff453a;">' + t('error/load_failed', 'Failed to load chapter.') + '</div>' +
        '<button onclick="history.back()" style="margin-top:14px;padding:8px 18px;' +
        'background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:6px;' +
        'cursor:pointer;font-family:inherit;font-size:1em;display:inline-flex;align-items:center;gap:6px;">' +
        '<img src="img/icons/back.svg" style="width:20px;height:20px;"> ' + t('btn/go_back', 'Go Back') + '</button>';
});

// ── Image-load waiter ──────────────────────────────────────
function waitForImages(cb) {
    var imgs  = document.querySelectorAll(".page-img");
    var total = imgs.length;
    if (total === 0) { cb(); return; }
    var done  = 0;
    function tick() { if (++done === total) cb(); }
    imgs.forEach(function (img) {
        if (img.complete) tick();
        else { img.addEventListener("load", tick); img.addEventListener("error", tick); }
    });
}

// ── Page position tracking ─────────────────────────────────
function calcPositions() {
    var imgs = document.querySelectorAll(".page-img");
    positions = [];
    imgs.forEach(function (img) {
        positions.push(img.getBoundingClientRect().top + window.scrollY);
    });
}

function updatePageIndicator() {
    var y    = window.scrollY;
    var page = 1;
    for (var i = 0; i < positions.length; i++) {
        if (positions[i] <= y + window.innerHeight * 0.45) page = i + 1;
    }
    currentPage = page;
    document.getElementById("pageIndicator").textContent = page + " / " + positions.length;
}

window.addEventListener("resize", function () {
    calcPositions();
    updatePageIndicator();
});

// ── Scroll listener ────────────────────────────────────────
var _raf = null;
window.addEventListener("scroll", function () {
    if (_raf) cancelAnimationFrame(_raf);
    _raf = requestAnimationFrame(function () {
        updatePageIndicator();
        if (saveProgress && positions.length > 0) {
            localStorage.setItem(PROG_KEY + chapterPath, currentPage);
        }
    });
});

// ── HUD toggle ─────────────────────────────────────────────
function showHUD(autoHideMs) {
    hudVisible = true;
    document.getElementById("hudTop").classList.remove("hidden");
    document.getElementById("hudBottom").classList.remove("hidden");
    clearTimeout(hudTimer);
    if (autoHideMs) hudTimer = setTimeout(hideHUD, autoHideMs);
}
function hideHUD() {
    hudVisible = false;
    document.getElementById("hudTop").classList.add("hidden");
    document.getElementById("hudBottom").classList.add("hidden");
    clearTimeout(hudTimer);
}
function toggleHUD() {
    if (hudVisible) hideHUD(); else showHUD(4000);
}

// Reader tap → toggle HUD
// Use touchend on mobile (avoids conflict with scroll) + click for desktop
var _touchMoved = false;
document.getElementById("reader").addEventListener("touchstart", function () { _touchMoved = false; }, { passive: true });
document.getElementById("reader").addEventListener("touchmove",  function () { _touchMoved = true;  }, { passive: true });
document.getElementById("reader").addEventListener("touchend",   function (e) {
    if (!_touchMoved) { e.preventDefault(); toggleHUD(); }
});
document.getElementById("reader").addEventListener("click", function () { toggleHUD(); });

// ── Chapter navigation ─────────────────────────────────────
function updateNavButtons() {
    var hasPrev = currentChIdx > 0;
    var hasNext = currentChIdx >= 0 && currentChIdx < allChapters.length - 1;

    document.getElementById("prevChBtn").disabled    = !hasPrev;
    document.getElementById("nextChBtn").disabled    = !hasNext;
    document.getElementById("nextChEndBtn").disabled = !hasNext;

    var endNameEl  = document.getElementById("endNextName");
    var endNoMore  = document.getElementById("endNoMore");
    var endNextBtn = document.getElementById("nextChEndBtn");
    if (hasNext) {
        endNameEl.textContent = t('reader/up_next', 'Up next:') + ' ' + cleanChName(allChapters[currentChIdx + 1].name);
        endNameEl.style.display = "block";
        endNextBtn.style.display = "inline-block";
        endNoMore.style.display  = "none";
    } else {
        endNameEl.style.display  = "none";
        endNextBtn.style.display = "none";
        endNoMore.style.display  = "block";
    }
}

function gotoChapter(path) {
    window.location.hash = encodeURIComponent(path);
    window.location.reload();
}

document.getElementById("prevChBtn").addEventListener("click", function () {
    if (currentChIdx > 0) gotoChapter(allChapters[currentChIdx - 1].path);
});
document.getElementById("nextChBtn").addEventListener("click", function () {
    if (currentChIdx >= 0 && currentChIdx < allChapters.length - 1)
        gotoChapter(allChapters[currentChIdx + 1].path);
});
document.getElementById("nextChEndBtn").addEventListener("click", function () {
    if (currentChIdx >= 0 && currentChIdx < allChapters.length - 1)
        gotoChapter(allChapters[currentChIdx + 1].path);
});
document.getElementById("backBtn").addEventListener("click", function () {
    // Navigate back to the library; include the manga root in the hash so
    // index.html can jump straight to the detail view without flashing the grid.
    if (mangaRootPath) {
        window.location.href = "index.html#manga=" + encodeURIComponent(mangaRootPath);
    } else {
        window.location.href = "index.html";
    }
});

// ── Chapter selector overlay ───────────────────────────────
function renderChapterOverlay() {
    var $btns = document.getElementById("chListBtns");
    $btns.innerHTML = "";
    allChapters.forEach(function (ch, idx) {
        var btn = document.createElement("button");
        btn.className   = "ch-list-btn" + (idx === currentChIdx ? " current" : "");
        btn.textContent = cleanChName(ch.name);
        btn.onclick     = function () {
            hideChapterOverlay();
            if (idx !== currentChIdx) gotoChapter(ch.path);
        };
        $btns.appendChild(btn);
    });
}

document.getElementById("chaptersBtn").addEventListener("click", function () {
    document.getElementById("chapterOverlay").style.display = "block";
    hideHUD();
    setTimeout(function () {
        var cur = document.querySelector(".ch-list-btn.current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "smooth" });
    }, 60);
});

function hideChapterOverlay() {
    document.getElementById("chapterOverlay").style.display = "none";
}
document.getElementById("chapterOverlay").addEventListener("click", function (e) {
    if (!document.getElementById("chapterPanel").contains(e.target)) hideChapterOverlay();
});

// ── Settings overlay ───────────────────────────────────────
document.getElementById("settingsBtn").addEventListener("click", function () {
    document.getElementById("settingsOverlay").style.display = "block";
    hideHUD();
});
function hideSettingsOverlay() {
    document.getElementById("settingsOverlay").style.display = "none";
}
document.getElementById("settingsOverlay").addEventListener("click", function (e) {
    if (!document.getElementById("settingsBox").contains(e.target)) hideSettingsOverlay();
});
document.getElementById("settingsCloseBtn").addEventListener("click", hideSettingsOverlay);

document.getElementById("toggleProgress").addEventListener("change", function () {
    saveProgress = this.checked;
    localStorage.setItem(SAVE_KEY, saveProgress);
    if (!saveProgress) localStorage.removeItem(PROG_KEY + chapterPath);
});
document.getElementById("togglePcMode").addEventListener("change", function () {
    pcMode = this.checked;
    localStorage.setItem(PC_KEY, pcMode);
    document.body.classList.toggle("pc-mode", pcMode);
    setTimeout(calcPositions, 250);
});

// ── Keyboard shortcuts ─────────────────────────────────────
document.addEventListener("keydown", function (e) {
    var chOverlay  = document.getElementById("chapterOverlay");
    var setOverlay = document.getElementById("settingsOverlay");
    if (e.key === "Escape") {
        if (chOverlay.style.display  !== "none") { hideChapterOverlay(); return; }
        if (setOverlay.style.display !== "none") { hideSettingsOverlay(); return; }
        window.location.href = "index.html";
    }
    if (e.key === "ArrowUp"   || e.key === "PageUp")   window.scrollBy({ top: -window.innerHeight * 0.85, behavior: "smooth" });
    if (e.key === "ArrowDown" || e.key === "PageDown")  window.scrollBy({ top:  window.innerHeight * 0.85, behavior: "smooth" });
    if (e.key === "h" || e.key === "H") toggleHUD();
});
</script>
</body>
</html>
