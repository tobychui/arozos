<!DOCTYPE html>

		<script src="../script/ao_module.js"></script>
		<script>
		// When Web Builder is embedded as an iframe inside another ArozOS app (e.g. Productivity),
		// ao_module_virtualDesktop is false because parent.isDesktopMode is not on the host app.
		// This patch detects that case and routes ao_module_openFileSelector through the real desktop,
		// registering the callback proxy on the host app window so the desktop can resolve it.
		(function(){
			try {
				if (ao_module_virtualDesktop || !parent.ao_module_virtualDesktop) { return; }
				ao_module_openFileSelector = function(callback, root, type, allowMultiple, options) {
					root = (root != null) ? root : 'user:/';
					type = type || 'file';
					allowMultiple = allowMultiple || false;

					var callbackname;
					if (typeof callback === 'string') {
						callbackname = callback;
					} else if (typeof callback === 'function' && callback.name) {
						callbackname = callback.name;
					} else {
						callbackname = '_aoFs_' + Date.now();
					}
					if (options && options.fnameOverride) {
						callbackname = options.fnameOverride;
					}

					// Register proxy on the host app window — the desktop resolves callbacks there
					parent[callbackname] = function(files) {
						try {
							var fn = (typeof callback === 'string') ? window[callback] : callback;
							if (fn) { fn(files); }
						} finally {
							delete parent[callbackname];
						}
					};

					var initInfo = {
						root: root,
						type: type,
						allowMultiple: allowMultiple,
						listenerUUID: '',
						options: options
					};
					// parent = host app window, parent.parent = ArozOS desktop
					parent.parent.newFloatWindow({
						url: 'SystemAO/file_system/file_selector.html#' + encodeURIComponent(JSON.stringify(initInfo)),
						width: 700,
						height: 440,
						appicon: 'SystemAO/file_system/img/selector.png',
						title: 'Open',
						parent: parent.ao_module_windowID,
						callback: callbackname
					});
				};
			} catch(e) {
				// Cross-origin or not nested — leave ao_module_openFileSelector unchanged
			}
		})();
		</script>
		<link rel="stylesheet" href="../script/semantic/semantic.min.css">

		<title>Web Builder</title>

	<body>
		<div class="ui compact mini top attached menu">
			<div class="item" style="font-weight: bold;">
				Web Builder
			</div>
			<div class="item" id="currentTitle">
				(Default Title)
			</div>
			<a class="item" onclick="setTitle();">
			  Change Title
			</a>
			<!-- 
			<a class="item">
			  Select Template
			</a>
			-->
			<a class="item" onclick="forceSavePost();">
				Save
			</a>
		  </div>
		<iframe id="editorFrame" src="framedEditor.html"></iframe>
		<script>
			var editingFile = "";
			var inputFiles = ao_module_loadInputFiles();
			var editorWindow = $("#editorFrame")[0].contentWindow;
			var currentWebDeployRoot = "";
			var savePendingContents = "";
			var currentTitle = "";
			var currentTemplate = "";
			
			if (inputFiles != null && inputFiles.length > 0){
				//Edit  mode
				inputFiles = inputFiles[0];
				ao_module_setWindowTitle(inputFiles.filename + " - Web Builder");
			}else{
				//New post mode
				ao_module_setWindowTitle("untitled.html " + "- Web Builder")
			}

			getWebRoot();

			function newEditor(){
				editorWindow.initEditor();
			}

			function setTitle(){
				var newtitle = prompt("Webpage Title", currentTitle);
				if (newtitle != null){
					updateTitle(newtitle);
				}
			}

			function updateTitle(newtitle){
				$("#currentTitle").text(newtitle);
				currentTitle = newtitle;
			}

			function handleWindowResize(){
				$(editorWindow.document).find("#suneditor_maineditor").css("width", "100%");
				var heightOverride = window.innerHeight - 45;
				$(editorWindow.document).find("#suneditor_maineditor").css("height",  + "px");
				$(editorWindow.document).find(".se-wrapper").css("height", heightOverride - 100 + "px");
				$(editorWindow.document).find(".se-wrapper-inner").css("height", heightOverride - 100 + "px");

				$("#editorFrame").css("height", heightOverride + "px");
			}

			
			$(window).on("resize", function(){
				handleWindowResize();
			});

			function handleSavefile(content){
				savePost(content);
				return false;
			}

			function forceSavePost(){
				var editorContent = editorWindow.getContent();
				savePost(editorContent);
				console.log("Saved");
			}

			function saveFileSelected(filedata){
				for (var i=0; i < filedata.length; i++){
					var filename = filedata[i].filename;
					var filepath = filedata[i].filepath;
					editingFile = filepath;
					ao_module_setWindowTitle(filename + " - Web Builder")
				}

				//savePost again
				var contentToSave = savePendingContents;
				savePendingContents = "";
				savePost(contentToSave);
			}

			function savePost(postContent){
				if (editingFile == ""){
					savePendingContents = postContent;
					ao_module_openFileSelector(saveFileSelected, currentWebDeployRoot || "user:/Desktop", "new",false, {
						defaultName: "untitled.html"
					});
					return false;
				}else{
					//Create post
					ao_module_agirun("Web Builder/backend/save.js", {
						filepath: editingFile,
						content: postContent,
						title: currentTitle,
					}, function(data){
						if (data.error !== undefined){
							alert(data.error);
						}else{
							
							
						}
					});
				}
			}

			function getWebRoot(callback = undefined){
				$.get("../system/network/www/webRoot", function(data){
					if (data == null || data == "" || data == undefined){
						callback("");
						return;
					}
					currentWebDeployRoot = data;
					if (callback != undefined){
						callback(data);
					}
					
				});
			}
		</script>
	</body>
</html>
